services:
  - type: web
    name: internal-mobility-assistant-api
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        sync: true
      - key: GEMINI_API_KEY
        sync: true
    disk:
      name: sqlite-volume
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /api/health
